<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RDH Clan Discord Server</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            overflow-x: hidden;
        }

        /* particles canvas */

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* header */

        header {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 2s;
        }

        h1 {
            font-size: 50px;
            margin: 0;
        }

        p {
            opacity: 0.8;
        }

        .button1 {
            margin-left: 835px;
            display: inline-block;
            margin-top: 40px;
            padding: 15px 35px;
            background: #5865F2;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        /* cards */

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 40px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            width: 260px;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        /* button */

        .button {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 35px;
            background: #5865F2;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .button:hover {
            background: #4752c4;
            transform: scale(1.05);
        }

        /* animation */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <header>
        <h1>RDH Clan Discord Server</h1>
        <p>Welcome to our awesome community</p>

        <a class="button" href="https://discord.gg/cH3hf8zb65">
            Join Discord
        </a>

        <a class="button" href="game.html">
            🎮 Play Biskas Game
        </a>

    </header>

    <div class="container">

        <div class="card">
            <h2>Rules</h2>
            <p>Be respectful and follow the server rules.</p>
        </div>

        <div class="card">
            <h2>Verify Bot</h2>
            <p>Use a button to access the server.</p>
        </div>

        <div class="card">
            <h2>Community</h2>
            <p>Meet new people and have fun.</p>
        </div>

        <div class="card">
            <h2>Members</h2>
            <p id="memberCount">Loading...</p>
        </div>

    </div>

    <a class="button1"
        href="https://discord.com/oauth2/authorize?client_id=YOUR_CLIENT_ID&response_type=code&redirect_uri=http://localhost:3000/auth/discord/callback&scope=identify">
        Login with Discord
    </a>

    <script>

        /* particle background */

        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];

        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5
            });
        }

        function animate() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {

                p.x += p.speedX;
                p.y += p.speedY;

                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

            });

            requestAnimationFrame(animate);

        }

        animate();

    </script>

    <script>

        fetch("https://discord.com/api/guilds/1398308186124980284/widget.json")
            .then(res => res.json())
            .then(data => {

                document.getElementById("memberCount").innerText =
                    data.presence_count + " members online";

            });

    </script>

</body>

</html>
